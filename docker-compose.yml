services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: TestTask
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/bootstrap/cache
      - /var/www/public/build
    networks:
      - testtask_network
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  webserver:
    image: nginx:alpine
    container_name: wserver_testtask
    restart: unless-stopped
    logging:
      driver: none
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - testtask_network
    depends_on:
      - app
  
  node:
    image: node:22-alpine
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - testtask_network
    depends_on:
      - app
    env_file:
      - .env

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_testtask
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    networks:
      - testtask_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: db_TestTask
    restart: unless-stopped
    logging:
      driver: none
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-testtask}
      MYSQL_USER: ${DB_USERNAME:-testtask}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3308:3306"
    volumes:
      - testtask_db_data:/var/lib/mysql
    networks:
      - testtask_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}" ]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  testtask_network:
    driver: bridge

volumes:
  testtask_db_data:
    driver: local
